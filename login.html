<html>
<head>
<title>Login Form</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:'Segoe UI',Arial,sans-serif;
background:lightblue;
min-height:500 px;
display:flex;
justify-content:center;
align-items:center;
}
.card{
background:white;
width:360px;
border-radius:12px;
box-shadow:0 4px 20px rgba(0,0,0,0.1);
padding:36px 32px;
}
h2{
font-size:1.4rem;
font-weight:700;
color:#222;
margin-bottom:6px;
}
.subtitle{
font-size:0.85rem;
color:#888;
margin-bottom:28px;
}
.field{margin-bottom:16px}
.field label{
display:block;
font-size:0.8rem;
font-weight:600;
color:#555;
margin-bottom:6px;
}
.field input{
width:100%;
padding:11px 14px;
border:1.5px solid #e0e0e0;
border-radius:8px;
font-size:0.9rem;
font-family:inherit;
color:#333;
outline:none;
background:#fafafa;
transition:border-color .2s;
}
.field input:focus{
border-color:#4f6ef7;
background:white;
}
.field input.error-field{border-color:#e74c3c}
.btn-login{
margin-top:20px;
width:100%;
padding:12px;
background:#4f6ef7;
color:white;
border:none;
border-radius:8px;
font-size:0.95rem;
font-family:inherit;
font-weight:600;
cursor:pointer;
transition:background .2s,transform .1s;
}
.btn-login:hover{background:#3a57d4}
.btn-login:active{transform:scale(.98)}

</style>
</head>
<body>
<div class="card">
<h2>Login</h2>
<p class="subtitle">Enter your credentials to continue</p>

<form id="loginForm" onsubmit="return handleLogin(event)" novalidate>

<div class="field">
<label for="email">Email</label>
<input type="email" id="email"/>
</div>

<div class="field">
<label for="password">Password</label>
<input type="password" id="password"/>
</div>

<button type="submit" class="btn-login">Sign In</button>
</form>


</div>

<script>
function handleLogin(e) {
e.preventDefault();
var emailEl = document.getElementById("email");
var passEl = document.getElementById("password");
var email = emailEl.value.trim();
var password = passEl.value.trim();
emailEl.classList.remove("error-field");
passEl.classList.remove("error-field");
if (!email && !password) {
emailEl.classList.add("error-field");
passEl.classList.add("error-field");
alert("Please enter your email and password.");
return false;
}
if (!email) {
emailEl.classList.add("error-field");
alert("Email address is required.");
emailEl.focus();
return false;
}
var emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
if (!emailRegex.test(email)) {
emailEl.classList.add("error-field");
alert("Please enter a valid email address.\nExample: user@example.com");
emailEl.focus();
return false;
}
if (!password) {
passEl.classList.add("error-field");
alert("Password is required.");
passEl.focus();
return false;
}
if (password.length < 6) {
passEl.classList.add("error-field");
alert("Password must be at least 6 characters long.");
passEl.focus();
return false;
}
alert("Login Successful!\n\nWelcome back, " + email);
return true;
}

</script>
</body>
</html>
